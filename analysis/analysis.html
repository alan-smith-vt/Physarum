<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Physarum Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #0c0e12;
    --panel: #13161c;
    --border: #1e2330;
    --text: #c8cdd8;
    --dim: #5a6170;
    --accent: #e8a44a;
    --accent2: #4a9de8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  #topbar {
    height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  #topbar .title {
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  #topbar .stat { color: var(--dim); }
  #topbar .stat b { color: var(--text); font-weight: 400; }

  #main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  #viewport-3d {
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  #viewport-3d canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  #status {
    position: absolute;
    top: 14px;
    left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    z-index: 1;
  }

  #load-progress {
    position: absolute;
    bottom: 40px;
    left: 14px;
    right: 14px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    z-index: 1;
    display: none;
  }

  #load-progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.15s;
  }

  #controls-hint {
    position: absolute;
    bottom: 14px;
    right: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    opacity: 0.6;
    z-index: 1;
  }

  #analysis-panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 16px;
    gap: 16px;
  }

  .section { display: flex; flex-direction: column; gap: 8px; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .section-body {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    line-height: 1.6;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }

  .slider-row input[type=range] {
    -webkit-appearance: none;
    width: 120px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    flex-shrink: 0;
  }

  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.15s;
  }

  .btn:hover { border-color: var(--accent); }

  .btn-row { display: flex; gap: 8px; }

  .check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    cursor: pointer;
  }

  .check-row input[type=checkbox] {
    accent-color: var(--accent);
  }

  #cross-section-view {
    width: 100%;
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  #cross-section-view canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  #cs-axes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #cs-axes text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    fill: var(--dim);
  }

  #cs-axes line {
    stroke: var(--dim);
    stroke-width: 0.5;
  }

  #cs-axes .tick-label {
    fill: #3a4050;
    font-size: 8px;
  }

  #cs-axes .axis-label {
    font-size: 10px;
    fill: var(--dim);
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="title">Physarum Analysis</div>
  <div class="stat">points: <b id="stat-points">—</b></div>
  <div class="stat">nodes: <b id="stat-nodes">—</b></div>
</div>

<div id="main">
  <div id="viewport-3d">
    <div id="status">loading...</div>
    <div id="load-progress"><div id="load-progress-bar"></div></div>
    <div id="controls-hint">drag to orbit · scroll to zoom · shift+drag to pan</div>
  </div>

  <div id="analysis-panel">

    <div class="section">
      <div class="section-label">Display</div>
      <div class="slider-row">
        <label>point size</label>
        <input type="range" id="point-size" min="1" max="5" step="1" value="1">
        <span id="val-psize">1</span>
      </div>
      <label class="check-row">
        <input type="checkbox" id="toggle-nodes"> show node bounds
      </label>
      <label class="check-row">
        <input type="checkbox" id="toggle-slice"> show z-slice
      </label>
    </div>

    <div class="section">
      <div class="section-label">Cross Section</div>
      <div id="cross-section-view">
        <svg id="cs-axes"></svg>
      </div>
      <div class="slider-row">
        <label>z slice</label>
        <input type="range" id="slice-z" min="-10" max="10" step="0.1" value="0">
        <span id="val-slice-z">0.0</span>
      </div>
      <div class="slider-row">
        <label>thickness</label>
        <input type="range" id="slice-thick" min="0.1" max="3.0" step="0.05" value="0.5">
        <span id="val-slice-thick">0.5</span>
      </div>
      <div class="section-body" id="cross-section-info">no data loaded</div>
    </div>

    <div class="section">
      <div class="section-label">Trace</div>
      <div class="slider-row">
        <label>z step</label>
        <input type="range" id="trace-zstep" min="0.05" max="1.0" step="0.05" value="0.2">
        <span id="val-zstep">0.20</span>
      </div>
      <div class="slider-row">
        <label>claim r</label>
        <input type="range" id="trace-claim" min="0.1" max="2.0" step="0.05" value="0.2">
        <span id="val-claim">0.20</span>
      </div>
      <div class="slider-row">
        <label>min branch</label>
        <input type="range" id="trace-branch" min="10" max="500" step="10" value="200">
        <span id="val-branch">200</span>
      </div>
      <div class="section-body" id="trace-status">ready</div>
      <div class="btn-row">
        <button class="btn" id="btn-trace" disabled>trace</button>
        <button class="btn" id="btn-reset" disabled>reset</button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="pco_viewer.js"></script>
<script src="analysis.js"></script>
</body>
</html>
