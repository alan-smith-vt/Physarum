<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Slice Viewer (Instanced)</title>
<style>
  body { margin: 0; background: #0c0e12; overflow: hidden; }
  canvas { display: block; }
  #hud { position: fixed; top: 10px; left: 10px; color: #888; font: 12px monospace; line-height: 1.6; }
</style>
</head>
<body>
<div id="hud">loading...</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(async () => {
  const hud = document.getElementById('hud');

  /* ── Fetch metadata + binary in parallel ── */
  const [meta, buf] = await Promise.all([
    fetch('/meta').then(r => r.json()),
    fetch('/slices').then(r => r.arrayBuffer())
  ]);

  /* ── Physical scale (mm) ── */
  const px = meta.pixel_x_um / 1000;   // mm per pixel X
  const py = meta.pixel_y_um / 1000;   // mm per pixel Y
  const lh = meta.layer_um   / 1000;   // mm per layer

  const xMm = meta.width     * px;     // model extent in mm
  const zMm = meta.height    * py;
  const yMm = meta.num_slices * lh;

  /* ── Decode pixels → mm-scale matrices ── */
  const dv  = new DataView(buf);
  const total = dv.getUint32(0, true);

  hud.textContent = `decoding ${total.toLocaleString()} pixels...`;

  const matrices = new Float32Array(total * 16);
  const colors   = new Float32Array(total * 3);

  let off = 4;
  for (let i = 0; i < total; i++) {
    const x = dv.getUint16(off,     true);
    const y = dv.getUint16(off + 2, true);
    const z = dv.getUint16(off + 4, true);
    const v = dv.getUint8 (off + 6) / 255;
    off += 7;

    const m = i * 16;
    matrices[m]      = 1;
    matrices[m + 5]  = 1;
    matrices[m + 10] = 1;
    matrices[m + 12] = x * px;          // mm
    matrices[m + 13] = z * lh;          // mm (layer → up)
    matrices[m + 14] = y * py;          // mm
    matrices[m + 15] = 1;

    // colors[i * 3]     = 1;              // solid white (swap to v tint below)
    // colors[i * 3 + 1] = 1;
    // colors[i * 3 + 2] = 1;
    colors[i * 3]     = v;           // warm AA tint
    colors[i * 3 + 1] = v * 0.65;
    colors[i * 3 + 2] = v * 0.3;
  }

  hud.innerHTML =
    `${total.toLocaleString()} voxels  |  ` +
    `${xMm.toFixed(1)} \u00d7 ${zMm.toFixed(1)} \u00d7 ${yMm.toFixed(1)} mm<br>` +
    `pixel: ${meta.pixel_x_um}\u00d7${meta.pixel_y_um} \u00b5m  |  layer: ${meta.layer_um} \u00b5m`;

  /* ── Renderer ── */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x0c0e12);
  document.body.appendChild(renderer.domElement);

  /* ── Camera + controls ── */
  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 500);
  const cx = xMm / 2, cy = yMm / 2, cz = zMm / 2;
  camera.position.set(cx + 15, cy + 8, cz + 20);

  const ctl = new THREE.OrbitControls(camera, renderer.domElement);
  ctl.target.set(cx, cy, cz);
  ctl.enableDamping = true;
  ctl.update();

  /* ── Scene + lights ── */
  const scene = new THREE.Scene();
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(1, 2, 1);
  scene.add(dirLight);
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));

  /* ── Instanced voxels (non-square: px × lh × py) ── */
  const box = new THREE.BoxGeometry(px, lh, py);
  const mat = new THREE.MeshLambertMaterial();
  const mesh = new THREE.InstancedMesh(box, mat, total);

  mesh.instanceMatrix = new THREE.InstancedBufferAttribute(matrices, 16);
  mesh.instanceColor  = new THREE.InstancedBufferAttribute(colors, 3);
  scene.add(mesh);

  /* ── Ground plane grid (mm) ── */
  const margin = 2;                    // mm extra around model
  const gx = Math.ceil(xMm + margin * 2);
  const gz = Math.ceil(zMm + margin * 2);
  const ox = -margin, oz = -margin;    // grid origin offset

  const tickStep = xMm > 10 ? 5 : 1;

  // Minor grid lines every 1mm, major at tickStep intervals aligned to model origin
  const minorPts = [], majorPts = [];
  for (let x = 0; x <= gx; x++) {
    const mm = ox + x;
    const arr = (mm >= 0 && Math.abs(mm % tickStep) < 0.01) ? majorPts : minorPts;
    arr.push(mm, 0, oz,  mm, 0, oz + gz);
  }
  for (let z = 0; z <= gz; z++) {
    const mm = oz + z;
    const arr = (mm >= 0 && Math.abs(mm % tickStep) < 0.01) ? majorPts : minorPts;
    arr.push(ox, 0, mm,  ox + gx, 0, mm);
  }
  const minorGeom = new THREE.BufferGeometry();
  minorGeom.setAttribute('position', new THREE.Float32BufferAttribute(minorPts, 3));
  scene.add(new THREE.LineSegments(minorGeom, new THREE.LineBasicMaterial({ color: 0x1a1a1a })));

  const majorGeom = new THREE.BufferGeometry();
  majorGeom.setAttribute('position', new THREE.Float32BufferAttribute(majorPts, 3));
  scene.add(new THREE.LineSegments(majorGeom, new THREE.LineBasicMaterial({ color: 0x444444 })));

  // Tick labels
  function makeLabel(text, color = '#ccc', fontSize = 32) {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 48;
    const g = c.getContext('2d');
    g.fillStyle = color;
    g.font = `${fontSize}px monospace`;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.fillText(text, 64, 24);
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(c), transparent: true, depthTest: true
    }));
    return s;
  }

  for (let x = 0; x <= xMm; x += tickStep) {
    const lbl = makeLabel(`${x}`);
    lbl.scale.set(2.0, 0.75, 1);
    lbl.position.set(x, -0.3, oz - 0.5);
    scene.add(lbl);
  }

  /* ── Vertical ruler ── */
  const rulerX = ox - 0.8, rulerZ = oz - 0.8;   // offset from model corner
  const rulerW = 0.3, rulerD = 0.3;              // ruler cross-section (mm)
  const tickMajor = 5, tickMinor = 1;            // mm intervals
  const rulerMat = new THREE.MeshLambertMaterial({ color: 0x888888 });

  // Main bar
  const barGeo = new THREE.BoxGeometry(rulerW, yMm, rulerD);
  const bar = new THREE.Mesh(barGeo, rulerMat);
  bar.position.set(rulerX, yMm / 2, rulerZ);
  scene.add(bar);

  // Tick marks + labels
  const tickMat = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
  for (let y = 0; y <= yMm; y += tickMinor) {
    const isMajor = Math.abs(y % tickMajor) < 0.01;
    const tw = isMajor ? 1.0 : 0.5;             // tick length (mm)
    const th = isMajor ? 0.15 : 0.08;           // tick height (mm)
    const tGeo = new THREE.BoxGeometry(tw, th, rulerD);
    const tick = new THREE.Mesh(tGeo, isMajor ? tickMat : rulerMat);
    tick.position.set(rulerX - rulerW / 2 - tw / 2, y, rulerZ);
    scene.add(tick);

    if (isMajor) {
      const lbl = makeLabel(`${y}`);
      lbl.scale.set(2.0, 0.75, 1);
      lbl.position.set(rulerX - rulerW / 2 - tw - 1.0, y, rulerZ);
      scene.add(lbl);
    }
  }

  /* ── Print bed grid (mm) ── */
  const pw = meta.plate_w_mm, ph = meta.plate_h_mm;
  // Center model on plate
  const bedOx = -(pw - xMm) / 2, bedOz = -(ph - zMm) / 2;

  // Plate outline
  const plateVerts = [
    bedOx, -0.01, bedOz,         bedOx + pw, -0.01, bedOz,
    bedOx + pw, -0.01, bedOz,    bedOx + pw, -0.01, bedOz + ph,
    bedOx + pw, -0.01, bedOz + ph, bedOx, -0.01, bedOz + ph,
    bedOx, -0.01, bedOz + ph,    bedOx, -0.01, bedOz,
  ];
  const plateGeom = new THREE.BufferGeometry();
  plateGeom.setAttribute('position', new THREE.Float32BufferAttribute(plateVerts, 3));
  scene.add(new THREE.LineSegments(plateGeom, new THREE.LineBasicMaterial({ color: 0x445566 })));

  // Bed grid lines every 10mm
  const bedPts = [];
  for (let x = 0; x <= pw; x += 10) {
    bedPts.push(bedOx + x, -0.01, bedOz,  bedOx + x, -0.01, bedOz + ph);
  }
  for (let z = 0; z <= ph; z += 10) {
    bedPts.push(bedOx, -0.01, bedOz + z,  bedOx + pw, -0.01, bedOz + z);
  }
  const bedGeom = new THREE.BufferGeometry();
  bedGeom.setAttribute('position', new THREE.Float32BufferAttribute(bedPts, 3));
  scene.add(new THREE.LineSegments(bedGeom, new THREE.LineBasicMaterial({ color: 0x181c22 })));

  // Bed tick labels every 50mm
  for (let x = 0; x <= pw; x += 50) {
    const lbl = makeLabel(`${x}`);
    lbl.scale.set(12, 4.5, 1);
    lbl.position.set(bedOx + x, -0.3, bedOz - 5);
    scene.add(lbl);
  }
  for (let z = 0; z <= ph; z += 50) {
    const lbl = makeLabel(`${z}`);
    lbl.scale.set(12, 4.5, 1);
    lbl.position.set(bedOx - 6, -0.3, bedOz + z);
    scene.add(lbl);
  }

  /* ── Loop ── */
  (function loop() {
    requestAnimationFrame(loop);
    ctl.update();
    renderer.render(scene, camera);
  })();

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
})();
</script>
</body>
</html>
